services:
  - type: web
    name: coworkspace-api
    runtime: dotnet
    region: ohio
    plan: free
    buildCommand: dotnet restore && dotnet publish -c Release -o out
    startCommand: dotnet out/Coworkspace.API.dll
    rootDir: backend
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:${PORT}
      - fromGroup: coworkspace-db
      - fromGroup: coworkspace-secrets

databases:
  - name: coworkspace-db
    region: ohio
    plan: free
    postgresMajorVersion: 16

envVarGroups:
  - name: coworkspace-db
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coworkspace-db
          property: connectionString
  - name: coworkspace-secrets
    envVars:
      - key: Jwt__Key
        sync: false
      - key: FRONTEND_URL
        sync: false

services:
  - type: web
    name: coworkspace-api
    env: docker
    region: ohio
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: coworkspace-db
          property: connectionString
      - fromGroup: coworkspace-secrets

databases:
  - name: coworkspace-db
    region: ohio
    plan: free
    postgresMajorVersion: 16

envVarGroups:
  - name: coworkspace-secrets
    envVars:
      - key: Jwt__Key
        sync: false
      - key: FRONTEND_URL
        sync: false
